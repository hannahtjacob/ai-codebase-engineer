services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite:////app/data/app.db
      CHROMA_PATH: /app/data/indexes/chroma
      REPO_STORAGE_PATH: /app/data/repos
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - streamlit
      - run
      - frontend/streamlit_app.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8501"
      - --browser.gatherUsageStats
      - "false"
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        - CMD-SHELL
        - >
          cypher-shell -u "$${NEO4J_USERNAME:-neo4j}"
          -p "$${NEO4J_PASSWORD:-password}" "RETURN 1;" >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
